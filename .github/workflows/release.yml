---
name: Release

"on":
  push:
    tags: [v*]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            ext: ""
            archive_ext: tar.gz
          - os: macos-latest
            target: macos-x86_64
            ext: ""
            archive_ext: tar.gz
          - os: macos-latest
            target: macos-aarch64
            ext: ""
            archive_ext: tar.gz
          - os: windows-latest
            target: windows-x86_64
            ext: .exe
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: cargo build --release

      - name: Prepare archive
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          dir="idot-$tag-${{ matrix.target }}"
          mkdir -p "$dir"
          cp target/release/idot${{ matrix.ext }} "$dir/"
          cp target/release/matrix${{ matrix.ext }} "$dir/"
          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            7z a -tzip "${dir}.zip" "$dir/"
          else
            tar czf "${dir}.tar.gz" "$dir/"
          fi

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: idot-*.tar.gz idot-*.zip
          generate_release_notes: true
