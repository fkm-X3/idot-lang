---
name: Release

"on":
  push:
    tags: [v*]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.create.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push version tag
        id: create
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags origin

          LATEST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            NEW_TAG="v0.0.1"
          else
            VERSION="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            case "${{ github.event.inputs.bump }}" in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
            esac
            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "Pushing tag: $NEW_TAG"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "tag_name=$NEW_TAG" >> "$GITHUB_OUTPUT"

  build:
    needs: [tag]
    if: always()
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            ext: ""
            archive_ext: tar.gz
          - os: macos-latest
            target: macos-x86_64
            ext: ""
            archive_ext: tar.gz
          - os: macos-latest
            target: macos-aarch64
            ext: ""
            archive_ext: tar.gz
          - os: windows-latest
            target: windows-x86_64
            ext: .exe
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: cargo build --release

      - name: Prepare archive
        shell: bash
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && needs.tag.outputs.tag_name || github.ref_name }}"
          dir="idot-$TAG-${{ matrix.target }}"
          mkdir -p "$dir"
          cp target/release/idot${{ matrix.ext }} "$dir/"
          cp target/release/matrix${{ matrix.ext }} "$dir/"
          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            7z a -tzip "${dir}.zip" "$dir/"
          else
            tar czf "${dir}.tar.gz" "$dir/"
          fi

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && needs.tag.outputs.tag_name || github.ref_name }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            idot-*.tar.gz idot-*.zip \
            2>/dev/null \
          || gh release upload "$TAG" idot-*.tar.gz idot-*.zip --clobber
