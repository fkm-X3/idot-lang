name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
      - run: cargo build --workspace
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo fmt --check

  compile-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build -p idot
      - run: |
          for f in examples/*.idot; do
            echo "::group::Compiling $f"
            cargo run -p idot -- compile "$f"
            echo "::endgroup::"
          done

  run-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build -p idot
      - run: |
          for f in examples/*.idot; do
            stem=$(basename "$f" .idot)
            echo "::group::$stem"
            cargo run -p idot -- run "$f"
            echo "::endgroup::"
          done

  test-compiler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build --workspace
      - name: Run compiler test suite
        run: cd compiler && cargo run -p matrix -- test

  test-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build --workspace
      - name: Build and run smoke-test
        run: cd smoke-test && cargo run -p matrix -- run
      - name: Build and run test-project
        run: cd test-project && cargo run -p matrix -- run
      - name: Build and run test-std-lib
        run: cd test-std-lib && cargo run -p matrix -- run

  compile-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build -p idot
      - name: Compile all test files to verify compilation
        run: |
          for f in tests/*.ido; do
            echo "::group::Compiling $f"
            cargo run -p idot -- compile "$f"
            echo "::endgroup::"
          done
