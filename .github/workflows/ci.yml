name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build bootstrap compiler
        run: cargo build --bin idot

      - name: Test std-lib (mem)
        shell: bash
        run: |
          cargo run --bin idot compile test-std-lib/src/test_mem.ido
          if [ "$RUNNER_OS" = "Windows" ]; then exe=".exe"; else exe=""; fi
          ./build/test_mem$exe

      - name: Test std-lib (math)
        shell: bash
        run: |
          cargo run --bin idot compile test-std-lib/src/test_math.ido
          if [ "$RUNNER_OS" = "Windows" ]; then exe=".exe"; else exe=""; fi
          ./build/test_math$exe

      - name: Test std-lib (collections)
        shell: bash
        run: |
          cargo run --bin idot compile test-std-lib/src/test_collections.ido
          if [ "$RUNNER_OS" = "Windows" ]; then exe=".exe"; else exe=""; fi
          ./build/test_collections$exe

      - name: Test std-lib (c bindings)
        shell: bash
        run: |
          cargo run --bin idot compile test-std-lib/src/test_c.ido
          if [ "$RUNNER_OS" = "Windows" ]; then exe=".exe"; else exe=""; fi
          ./build/test_c$exe

      - name: Test std-lib (io)
        shell: bash
        run: |
          cargo run --bin idot compile test-std-lib/src/test_io.ido
          if [ "$RUNNER_OS" = "Windows" ]; then exe=".exe"; else exe=""; fi
          ./build/test_io$exe

      - name: Test generics
        shell: bash
        run: |
          cargo run --bin idot compile tests/test_generics.ido
          if [ "$RUNNER_OS" = "Windows" ]; then exe=".exe"; else exe=""; fi
          ./build/test_generics$exe

      - name: Test imports
        shell: bash
        run: |
          cargo run --bin idot compile tests/test_imports.ido
          if [ "$RUNNER_OS" = "Windows" ]; then exe=".exe"; else exe=""; fi
          ./build/test_imports$exe

      - name: Self-hosting: build compiler
        run: cargo run --bin idot compile compiler/src/main.ido

      - name: Clean up build artifacts
        shell: bash
        run: rm -f build/test_*.c build/test_*.exe build/test_*.out build/main.c build/main.exe build/main.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check YAML formatting
        run: |
          if command -v yamllint &> /dev/null; then
            yamllint .github/workflows/*.yml
          else
            echo "yamllint not available, skipping"
          fi
