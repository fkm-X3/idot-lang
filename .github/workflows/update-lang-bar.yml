---
name: Update language breakdown

'on':
  schedule:
    - cron: '0 0 * * 0'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run language breakdown script
        run: .github/scripts/lang-bar.sh

      - name: Deploy SVG to Assets Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: assets
          folder: assets
          target-folder: assets
