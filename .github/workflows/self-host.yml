name: Self-hosting Check

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "compiler/src/**"
      - "lib/**"

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install clang (Idot compiler uses clang for C backend)
        run: sudo apt-get update && sudo apt-get install -y clang

      - run: cargo build -p idot
      - run: mkdir -p build

      # Stage 1: Rust bootstrap compiles the Idot compiler source.
      # The Rust bootstrap uses `cc` (gcc) and outputs build/main (no extension on Linux).
      - name: "Stage 1 — compile Idot compiler via Rust bootstrap"
        run: cargo run -p idot -- compile compiler/src/main.ido
      - run: cp build/main build/stage1

      # Stage 2: The stage 1 Idot compiler compiles itself.
      # The Idot compiler hardcodes `clang` and always outputs build/main.exe.
      - name: "Stage 2 — compile Idot compiler via stage 1"
        run: ./build/stage1 compile compiler/src/main.ido
      - run: cp build/main.exe build/stage2

      # Stage 3: The stage 2 compiler compiles itself again.
      - name: "Stage 3 — compile Idot compiler via stage 2"
        run: ./build/stage2 compile compiler/src/main.ido

      # Bootstrap achieved when stage 2 and stage 3 produce byte-identical binaries.
      - name: "Verify — compare stage 2 and stage 3"
        run: |
          if cmp --silent build/stage2 build/main.exe; then
            echo "✓ Bootstrap verified: stage 2 and stage 3 are byte-identical"
          else
            echo "✗ Bootstrap failed: stage 2 and stage 3 differ"
            ls -la build/
            exit 1
          fi
