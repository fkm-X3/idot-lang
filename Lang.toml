#  idot language specification
#  Edit this file to change the language. The lexer, parser,
#  and compiler read everything from here automatically.

[meta]
name    = "idot"
version = "DEB.BUILD"
target  = "c"          # c | (future: js, llvm, bytecode)
file_ext = "id"

# ── Types ────────────────────────────────────────────────────
# Each type maps to a C type and has optional range info.
[[types]]
name     = "int"
c_type   = "int64_t"
category = "integer"

[[types]]
name     = "float"
c_type   = "double"
category = "float"

[[types]]
name     = "bool"
c_type   = "bool"
category = "bool"

[[types]]
name     = "str"
c_type   = "char*"
category = "string"

[[types]]
name     = "void"
c_type   = "void"
category = "void"

# ── Keywords ─────────────────────────────────────────────────
# role: control | decl | literal | modifier
[[keywords]]
word = "fn"
role = "decl"
description = "function declaration"

[[keywords]]
word = "let"
role = "decl"
description = "immutable variable"

[[keywords]]
word = "mut"
role = "modifier"
description = "marks a variable as mutable"

[[keywords]]
word = "if"
role = "control"
description = "conditional"

[[keywords]]
word = "else"
role = "control"
description = "else branch"

[[keywords]]
word = "while"
role = "control"
description = "while loop"

[[keywords]]
word = "for"
role = "control"
description = "for loop"

[[keywords]]
word = "in"
role = "control"
description = "iterator keyword for for-loops"

[[keywords]]
word = "return"
role = "control"
description = "return from function"

[[keywords]]
word = "true"
role = "literal"
description = "boolean true"

[[keywords]]
word = "false"
role = "literal"
description = "boolean false"

[[keywords]]
word = "and"
role = "control"
description = "logical and"

[[keywords]]
word = "or"
role = "control"
description = "logical or"

[[keywords]]
word = "not"
role = "control"
description = "logical not"

# ── Operators ────────────────────────────────────────────────
# precedence: higher = tighter binding
# assoc: left | right | none
[[operators]]
symbol = "+"
name   = "add"
prec   = 10
assoc  = "left"
c_op   = "+"
arity  = "binary"

[[operators]]
symbol = "-"
name   = "sub"
prec   = 10
assoc  = "left"
c_op   = "-"
arity  = "binary"

[[operators]]
symbol = "*"
name   = "mul"
prec   = 20
assoc  = "left"
c_op   = "*"
arity  = "binary"

[[operators]]
symbol = "/"
name   = "div"
prec   = 20
assoc  = "left"
c_op   = "/"
arity  = "binary"

[[operators]]
symbol = "%"
name   = "mod"
prec   = 20
assoc  = "left"
c_op   = "%"
arity  = "binary"

[[operators]]
symbol = "=="
name   = "eq"
prec   = 5
assoc  = "left"
c_op   = "=="
arity  = "binary"

[[operators]]
symbol = "!="
name   = "neq"
prec   = 5
assoc  = "left"
c_op   = "!="
arity  = "binary"

[[operators]]
symbol = "<"
name   = "lt"
prec   = 7
assoc  = "left"
c_op   = "<"
arity  = "binary"

[[operators]]
symbol = ">"
name   = "gt"
prec   = 7
assoc  = "left"
c_op   = ">"
arity  = "binary"

[[operators]]
symbol = "<="
name   = "lte"
prec   = 7
assoc  = "left"
c_op   = "<="
arity  = "binary"

[[operators]]
symbol = ">="
name   = "gte"
prec   = 7
assoc  = "left"
c_op   = ">="
arity  = "binary"

[[operators]]
symbol = "="
name   = "assign"
prec   = 1
assoc  = "right"
c_op   = "="
arity  = "binary"

[[operators]]
symbol = "-"
name   = "neg"
prec   = 30
assoc  = "right"
c_op   = "-"
arity  = "unary"

# ── Delimiters ───────────────────────────────────────────────
[delimiters]
block_open   = "{"
block_close  = "}"
paren_open   = "("
paren_close  = ")"
arg_sep      = ","
type_sep     = ":"    # used in  let x: int = 5
return_type  = "->"   # used in  fn foo() -> int
statement_end = ";"   # optional — parser accepts with or without

# ── Syntax rules (how constructs are written) ─────────────────
# These drive the parser's pattern matching.
[syntax]

# let x: int = expr
# let mut x: int = expr
var_decl = "('mut'?) IDENT ':' TYPE '=' expr"

# fn name(params) -> type { body }
func_decl = "'fn' IDENT '(' params ')' ('->' TYPE)? block"

# if expr { block } (else { block })?
if_stmt = "'if' expr block ('else' block)?"

# while expr { block }
while_stmt = "'while' expr block"

# for x in expr { block }
for_stmt = "'for' IDENT 'in' expr block"

# return expr?
return_stmt = "'return' expr?"

# ── Built-in functions ───────────────────────────────────────
# These are injected into the C runtime header automatically.
[[builtins]]
name      = "print"
params    = ["str"]
ret       = "void"
c_impl    = 'printf("%s\n", $0)'

[[builtins]]
name      = "print_int"
params    = ["int"]
ret       = "void"
c_impl    = 'printf("%lld\n", (long long)$0)'

[[builtins]]
name      = "print_float"
params    = ["float"]
ret       = "void"
c_impl    = 'printf("%g\n", $0)'

[[builtins]]
name      = "to_str"
params    = ["int"]
ret       = "str"
c_impl    = '({ static char _buf[64]; snprintf(_buf,64,"%lld",(long long)$0); _buf; })'

# ── Compiler output settings ─────────────────────────────────
[codegen]
include_headers = ["<stdio.h>", "<stdint.h>", "<stdbool.h>", "<string.h>"]
runtime_guard   = "IDOT_RUNTIME_H"
entry_point     = "main"          # idot function that becomes C main()
indent          = "    "          # 4 spaces